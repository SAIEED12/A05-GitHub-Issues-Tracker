<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>
    <!-- Tailwind + DaisyUI + Fonts -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <linkn
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }

    </style>
  </head>
  <body class="min-h-screen ">

    <!-- Navbar -->
    <nav>
      <div class="navbar bg-base-100 shadow-sm flex justify-between sm:px-12">
        <div class="flex justify-between">
          <img src="./assets/github-logo.png" alt="logo" class="w-9" />
          <a class="btn btn-ghost text-xl hidden sm:flex">GitHub Issues Tracker</a>
        </div>

        <div class="flex gap-4">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
        </div>
      </div>
    </nav>

    <main class="w-9/12 mx-auto rounded-lg">

      <!-- Tab Section -->
      <div id="tab-section" class="flex gap-2 p-6 mt-10 bg-white rounded-lg shadow-lg">
        <button onclick="selectTab('all')" id="all" class="btn btn btn-primary px-12">All</button>
        <button onclick="selectTab('open')" id="open" class="btn btn btn-outline px-12">Open</button>
        <button onclick="selectTab('closed')" id="closed" class="btn btn btn-outline px-12">Closed</button>
      </div>

      <!-- Issues Container -->
      <div class="bg-white card card-body shadow-lg col-span-6 mt-6">

        <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-4 gap-6">

          <!-- Dynamically all cards will be added here through API -->

        </div>

      </div>
    </main>


    <script src="./script/script.js"></script>
  </body>
</html>
